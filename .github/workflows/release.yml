name: release-builds

on:
  release:
    types: [published]
  workflow_dispatch:

defaults:
  run:
    working-directory: app_flutter

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
      - name: Go tests
        working-directory: server
        run: go test ./...
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Flutter tests
        run: flutter test

  docker:
    if: github.event_name == 'release'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Build and push image
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}
          echo "$GH_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          docker build -t "$IMAGE:$GITHUB_REF_NAME" .
          docker push "$IMAGE:$GITHUB_REF_NAME"
          # ponytail: :latest only for real releases so a pre-release can't move it
          if [ "${{ github.event.release.prerelease }}" != "true" ]; then
            docker tag "$IMAGE:$GITHUB_REF_NAME" "$IMAGE:latest"
            docker push "$IMAGE:latest"
          fi

  linux:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install build deps
        # ponytail: bundle_libmpv.sh is dnf-only; on CI we ship against apt's libmpv
        run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev libmpv-dev mpv
      - run: flutter build linux --release
      - name: Package
        run: tar -C build/linux/x64/release/bundle -czf aria-linux-x64.tar.gz .
      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" aria-linux-x64.tar.gz --clobber

  flatpak:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install flatpak tooling + runtime
        # The .flatpak bundle carries only the app; libmpv/libplacebo/libass are
        # built from source inside the Sdk sandbox by the manifest. The runtime
        # itself is resolved from flathub on the user's machine at install time.
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Platform//25.08 org.freedesktop.Sdk//25.08
      - name: Build Flutter bundle
        # The manifest packages this host-built bundle (source: type dir).
        run: flutter build linux --release
      - name: Build flatpak bundle
        working-directory: .
        # ponytail: build from source each release, no flatpak-builder cache.
        # Adds ~10 min for mpv/libplacebo. Add actions/cache on .flatpak-builder
        # if the runtime becomes a bottleneck.
        run: |
          flatpak-builder --user --force-clean --repo=repo \
            build-flatpak packaging/flatpak/dev.aria.aria.yml
          flatpak build-bundle repo aria-linux-x64.flatpak dev.aria.aria
      - name: Upload to release
        if: github.event_name == 'release'
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" aria-linux-x64.flatpak --clobber

  macos:
    needs: test
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      # connectivity_plus 7.2.0 uses NWPath.isUltraConstrained (Xcode 26 SDK);
      # the runner's default Xcode is older, so select the latest stable.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter build macos --release
      - name: Ad-hoc sign
        # ponytail: ad-hoc signature (runs fine locally, app data survives updates);
        # switch to Developer ID cert + notarization when distributing to other people
        run: codesign --force --deep -s - build/macos/Build/Products/Release/aria.app
      - name: Package
        run: ditto -c -k --keepParent build/macos/Build/Products/Release/aria.app aria-macos.zip
      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" aria-macos.zip --clobber

  android:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Restore release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/aria-release.jks"
      - name: Build signed APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/aria-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: flutter build apk --release
      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk aria-android.apk
          gh release upload "$GITHUB_REF_NAME" aria-android.apk --clobber
