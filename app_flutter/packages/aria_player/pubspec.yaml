name: aria_player
description: Direct libmpv FFI audio engine for Aria. Bit-perfect native playback, gapless, no browser audio stack.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.4
  # These three exist solely for their bundled libmpv binaries.
  media_kit_libs_linux: ^1.2.1
  media_kit_libs_macos_audio: ^1.1.4
  media_kit_libs_android_audio: ^1.3.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
