name: aria
description: "Aria v2 — self-hosted lossless music player (Flutter client)."
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^3.0.0
  go_router: ^16.0.0
  shared_preferences: ^2.5.0

  # Local packages.
  aria_api:
    path: packages/aria_api
  aria_player:
    path: packages/aria_player

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
