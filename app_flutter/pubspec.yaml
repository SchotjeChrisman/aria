name: aria
description: "Aria v2 — self-hosted lossless music player (Flutter client)."
publish_to: 'none'

# build number tracks release count — Android needs it rising to update in place
version: 3.0.0+11

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^3.0.0
  go_router: ^16.0.0
  shared_preferences: ^2.5.0
  # App-support dir for the NDJSON log file (core/log.dart).
  path_provider: ^2.1.0
  # Wifi/cellular detection for the data-usage gates (core/data_usage.dart).
  connectivity_plus: ^7.2.0

  # Android only: media session + foreground service (background playback)
  # and becoming-noisy handling. audio_service 0.18 needs audio_session 0.1.
  audio_service: ^0.18.15
  audio_session: ^0.1.25

  # Local packages.
  aria_api:
    path: packages/aria_api
  aria_player:
    path: packages/aria_player

  cupertino_icons: ^1.0.8
  pdfrx: ^2.4.4
  # Custom cover-art upload: cross-platform image file picking (returns bytes).
  file_picker: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Tests only: MockClient for the download worker (already transitive via
  # aria_api — declared so test imports are honest, not a new runtime dep).
  http: ^1.2.0
  # Generates platform launcher icons from branding/ (run: dart run
  # flutter_launcher_icons). Dev-only tool, not shipped.
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

# App icon: white G-clef on the aria accent (#D13B58). Source art in branding/,
# regenerate with `dart run flutter_launcher_icons`.
flutter_launcher_icons:
  image_path: "branding/icon.png"
  android: true
  min_sdk_android: 21
  adaptive_icon_background: "#D13B58"
  adaptive_icon_foreground: "branding/icon_foreground.png"
  macos:
    generate: true
    image_path: "branding/icon.png"
