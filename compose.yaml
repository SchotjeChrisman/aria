services:
  aria:
    # Release CI pushes this tag; watchtower below picks it up. For local
    # dev builds: docker compose up --build
    image: ghcr.io/schotjechrisman/aria:latest
    build: .
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true
    ports:
      - "3001:3000"
    volumes:
      # NFS can't be SELinux-relabeled (no :z) — virt_use_nfs boolean grants access instead
      - /mnt/nfs/share/media/music:/music:ro
      - aria-data:/data:z
    healthcheck:
      # distroless has no shell/curl; the binary probes its own /healthz
      test: ["CMD", "/aria", "-healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      # Podman host: systemctl enable --now podman.socket, then
      # DOCKER_SOCKET=/run/podman/podman.sock
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
    # label-enable: only containers opted in above; cleanup: drop old images
    command: --label-enable --cleanup --interval 86400

volumes:
  aria-data:
