services:
  aria:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # NFS can't be SELinux-relabeled (no :z) — virt_use_nfs boolean grants access instead
      - /mnt/nfs/share/media/music:/music:ro
      - aria-data:/data:z
    healthcheck:
      # distroless has no shell/curl; the binary probes its own /healthz
      test: ["CMD", "/aria", "-healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  aria-data:
