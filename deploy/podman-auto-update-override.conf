# Drop-in for podman-auto-update.timer: check every 15 minutes instead of daily.
# The check is a cheap registry HEAD; the image only moves on stable releases.
#
# Install (as the deploy user):
#   mkdir -p ~/.config/systemd/user/podman-auto-update.timer.d
#   cp podman-auto-update-override.conf ~/.config/systemd/user/podman-auto-update.timer.d/override.conf
#   systemctl --user daemon-reload
#   systemctl --user enable --now podman-auto-update.timer

[Timer]
OnCalendar=
OnCalendar=*:0/15
RandomizedDelaySec=2m
